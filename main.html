<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form style="display:flex; flex-direction:column; justify-content:center">
		<label for="name">Name:</label>
		<input id="name" type="text" name="Name" placeholder="Name" required>
		<label for="email">Email:</label>
		<input id="email" type="text" name="Email" placeholder="Email" required>
		<label for="gender_m">Male:</label>
		<input id="gender_m" type="radio" value="male" name="Gender" required>
		<label for="gender_f">Female:</label>
		<input id="gender_f" type="radio" value="female" name="Gender" required>
		<label for="cars">Car Brands:</label>
		<select id="cars">
			<option value="" disabled selected>--Please choose an option--</option>
			<option>Volvo</option>
			<option>Mercedez</option>
			<option>Tata</option>
		</select>
		<label for="name">Age:</label>
		<input id="name" type="Number" name="Age" placeholder="Age" required>
		<label for="name">DOB:</label>
		<input id="name" type="Date" name="DOB" required>
		<label for="tel">Phone Number:</label>
		<input id="tel" type="Tel" name="Phone Number"placeholder="xxx-xxx-xxxx">
		<label for="password">Password:</label>
		<input id="password" type="Password" name="Password" placeholder="Password" required>
		<label for="tos">I agree to the TOS:</label>
		<input id="tos" type="checkbox" name="I agree to the TOS" required>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
